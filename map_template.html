<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloodNet NYC — Oct 30 Storm</title>
  <script src="https://unpkg.com/deck.gl@8.9.36/dist.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e5e3df;
    }

    #container { width: 100vw; height: 100vh; }

    /* ── Floating timeline bar ──────────────────────────────────── */
    #timeline {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: min(700px, calc(100vw - 40px));
      background: rgba(12, 12, 20, 0.86);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 18px;
      padding: 14px 18px 12px;
      color: #fff;
      z-index: 100;
      user-select: none;
    }

    #tl-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    #current-time {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      font-variant-numeric: tabular-nums;
    }

    #storm-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: rgba(255, 255, 255, 0.38);
    }

    #tl-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #play-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s;
      line-height: 1;
    }
    #play-btn:hover { background: rgba(255, 255, 255, 0.22); }

    #scrubber {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.16);
      outline: none;
      cursor: pointer;
    }
    #scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    #scrubber::-moz-range-thumb {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
    }

    #speed-select {
      appearance: none;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      border-radius: 7px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      outline: none;
      min-width: 40px;
      text-align: center;
    }
    #speed-select option { background: #1a1a2e; color: #fff; }

    /* ── Legend ─────────────────────────────────────────────────── */
    #legend {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: 16px;
      padding: 24px 28px;
      font-size: 24px;
      color: #222;
      z-index: 100;
      line-height: 1;
    }

    .lg-title {
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 16px;
    }

    .lg-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    .lg-row:last-child { margin-bottom: 0; }

    .lg-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Tooltip ─────────────────────────────────────────────────── */
    /* deck.gl injects tooltip via getTooltip — we style via the
       returned style object, not CSS class */
  </style>
</head>
<body>

<div id="container"></div>

<div id="legend">
  <div class="lg-title">Legend</div>
  <div class="lg-row">
    <div class="lg-dot" style="background:#aaaaaa; opacity:0.75;"></div>
    <span>Sensor — idle</span>
  </div>
  <div class="lg-row">
    <div class="lg-dot" style="background:#08306b;"></div>
    <span>Sensor — flooding</span>
  </div>
  <div class="lg-row">
    <div class="lg-dot" style="background:#e74c3c;"></div>
    <span>311 complaint</span>
  </div>
  <div id="mrms-legend-row" style="display:none; margin-top:10px;">
    <div class="lg-title" style="margin-bottom:8px;">Radar VIL (kg/m²)</div>
    <div style="display:flex; justify-content:space-between; font-size:18px; color:#999; margin-bottom:5px;">
      <span>4</span><span>8</span><span>12</span><span>15+</span>
    </div>
    <div style="height:13px; border-radius:4px; background:linear-gradient(to right,
      rgba(255,255,178,0.25),
      rgba(254,204,92,0.55),
      rgba(253,141,60,0.72),
      rgba(240,59,32,0.82),
      rgba(189,0,38,0.87));
    "></div>
  </div>
</div>

<div id="timeline">
  <div id="tl-header">
    <span id="current-time">—</span>
    <span id="storm-label">Storm · Oct 30 – 31, 2025</span>
  </div>
  <div id="tl-controls">
    <button id="play-btn" aria-label="Play">&#9654;</button>
    <input type="range" id="scrubber" min="0" max="10000" value="0" aria-label="Timeline">
    <select id="speed-select" aria-label="Speed">
      <option value="1">1×</option>
      <option value="2">2×</option>
      <option value="4" selected>4×</option>
      <option value="8">8×</option>
    </select>
  </div>
</div>

<script>
// ── Embedded data (injected by generate_map.py) ───────────────────
const SENSOR_LOCS    = __SENSOR_LOCS__;
const FLOOD_SERIES   = __FLOOD_SERIES__;
const COMPLAINTS     = __COMPLAINTS__;
const STORM_START_MS = __STORM_START_MS__;
const STORM_END_MS   = __STORM_END_MS__;
const MAX_DEPTH      = __MAX_DEPTH__;
// MRMS VIL raster frames: [{t_ms, png_b64}, ...] sorted by t_ms.
// png_b64 is null for frames below VIL threshold (no visible content).
// Empty array if query_mrms.py has not been run.
const MRMS_FRAMES    = __MRMS_FRAMES__;

// ── Constants ──────────────────────────────────────────────────────
const FADE_MS     = 1.5 * 3600 * 1000;     // 311 complaint fade window
const STORM_MS    = STORM_END_MS - STORM_START_MS;
// Base speed: storm minutes per real second at 1×
const BASE_SPEED  = 10 * 60 * 1000;        // 10 storm-min / real-sec

// ── MRMS VIL helpers ───────────────────────────────────────────────
// Precompute data URLs once; null entries stay null (no layer rendered).
const mrmsUrls  = MRMS_FRAMES.map(f => f.png_b64 ? 'data:image/png;base64,' + f.png_b64 : null);
const mrmsTimes = MRMS_FRAMES.map(f => f.t_ms);

// Binary search: index of the last MRMS frame at or before t_ms (-1 if none)
function mrmsIdxAt(t_ms) {
  if (!mrmsTimes.length) return -1;
  let lo = -1, hi = mrmsTimes.length;
  while (lo + 1 < hi) {
    const mid = (lo + hi) >> 1;
    if (mrmsTimes[mid] <= t_ms) lo = mid; else hi = mid;
  }
  return lo;
}

// ── Colour: light-gray → #08306b ──────────────────────────────────
function depthToRGB(depth) {
  const t = Math.min(depth / MAX_DEPTH, 1.0);
  return [
    Math.round(204 + t * (  8 - 204)),
    Math.round(204 + t * ( 48 - 204)),
    Math.round(204 + t * (107 - 204)),
  ];
}

// ── Pre-process flood series into a Map ───────────────────────────
// Each entry: sorted array of [t_ms, depth]
const floodMap = new Map(Object.entries(FLOOD_SERIES));

// ── Binary-search depth interpolation ────────────────────────────
function depthAt(sensorId, t_ms) {
  const s = floodMap.get(sensorId);
  if (!s || s.length === 0) return null;

  // Binary search for the last point <= t_ms
  let lo = -1, hi = s.length;
  while (lo + 1 < hi) {
    const mid = (lo + hi) >> 1;
    if (s[mid][0] <= t_ms) lo = mid; else hi = mid;
  }

  if (lo === -1) return null;  // before the flood started

  if (hi >= s.length) {
    // Past the last profile point — hold the final value for up to 90s
    return t_ms - s[lo][0] > 90000 ? null : s[lo][1];
  }

  // Between two known points — always interpolate, regardless of gap size
  const frac = (t_ms - s[lo][0]) / (s[hi][0] - s[lo][0]);
  return s[lo][1] + frac * (s[hi][1] - s[lo][1]);
}

// ── Per-frame depth lookup (pre-computed into a plain object) ──────
// Keeping a stable depthCache object means accessor closures always
// read from the same reference — no layer re-initialisation needed.
const depthCache = {};

function updateDepthCache(t_ms) {
  for (const s of SENSOR_LOCS) {
    const d = depthAt(s.id, t_ms);
    depthCache[s.id] = (d !== null && d > 0) ? d : 0;
  }
}

// ── Tooltip helper ─────────────────────────────────────────────────
const TOOLTIP_STYLE = {
  background: 'rgba(12,12,20,0.92)',
  color: '#fff',
  fontSize: '12px',
  lineHeight: '1.6',
  padding: '8px 12px',
  borderRadius: '9px',
  border: '1px solid rgba(255,255,255,0.1)',
  pointerEvents: 'none',
  maxWidth: '220px',
};

// ── deck.gl setup ─────────────────────────────────────────────────
// Use deck.Deck (vanilla JS class), not deck.DeckGL (React wrapper).
const { Deck, TileLayer, ScatterplotLayer, BitmapLayer } = deck;

// Create and size the canvas manually so it fills the container.
const canvas = document.createElement('canvas');
Object.assign(canvas.style, {
  position: 'absolute', top: '0', left: '0',
  width: '100%', height: '100%',
});
document.getElementById('container').appendChild(canvas);

const deckgl = new Deck({
  canvas,
  width:  window.innerWidth,
  height: window.innerHeight,
  initialViewState: {
    longitude: -73.9760,
    latitude:   40.7128,
    zoom:       10,
    pitch:       0,
    bearing:     0,
  },
  controller: true,
  layers: [],
  getTooltip({ object, layer }) {
    if (!object) return null;
    const id = layer && layer.id;
    let html;
    if (id === 'sensors') {
      const depth = depthCache[object.id] || 0;
      html = `<b>${object.name}</b><br>${object.borough || '—'}<br>`
           + (depth > 0
               ? `<span style="color:#7ab9f5">${depth.toFixed(1)} in depth</span>`
               : `<span style="opacity:0.55">No active flood</span>`);
    } else if (id === 'complaints') {
      html = `<b>311: ${object.descriptor}</b><br>${object.borough || '—'}`;
    } else {
      return null;
    }
    return { html, style: TOOLTIP_STYLE };
  },
});

// Frame counter used as updateTrigger — increments each render so
// deck.gl re-evaluates accessors without treating t_ms (a float) as
// the signal, which would also force buffer rebuilds on sub-ms changes.
let frameId = 0;

function buildLayers(t_ms) {
  frameId++;
  return [
    // Basemap — CartoDB Positron raster tiles
    new TileLayer({
      id: 'basemap',
      data: 'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png',
      maxZoom: 19, minZoom: 0,
      renderSubLayers(props) {
        const { west, south, east, north } = props.tile.bbox;
        return new BitmapLayer(props, {
          data: null,
          image: props.tile.data,
          bounds: [west, south, east, north],
        });
      },
    }),

    // MRMS VIL raster — BitmapLayer, nearest-neighbour frame lookup.
    // Opacity is baked into the PNG alpha channel (transparent below 4 kg/m²,
    // ramping to 85 % at 15 kg/m²).  Skipped when no data or frame is null.
    ...((() => {
      const idx = mrmsIdxAt(t_ms);
      if (idx < 0 || !mrmsUrls[idx]) return [];
      return [new BitmapLayer({
        id: 'mrms',
        image: mrmsUrls[idx],
        bounds: MRMS_BOUNDS,
        opacity: 1.0,
      })];
    })()),

    // ALL sensors in one stable layer — sensors never leave, they just
    // change size and colour. Eliminates the quiet↔active swap flicker.
    new ScatterplotLayer({
      id: 'sensors',
      data: SENSOR_LOCS,           // static reference, never replaced
      getPosition: d => [d.lon, d.lat],
      getRadius: d => {
        const depth = depthCache[d.id];
        return depth > 0 ? 196 + 900 * Math.min(depth / MAX_DEPTH, 1.0) : 196;
      },
      getFillColor: d => {
        const depth = depthCache[d.id];
        if (depth > 0) return [...depthToRGB(depth), 230];
        return [140, 140, 140, 220];
      },
      radiusUnits: 'meters',
      radiusMinPixels: 2,
      updateTriggers: { getRadius: frameId, getFillColor: frameId },
      pickable: true,
    }),

    // 311 complaints — static data array, accessors encode visibility.
    // Radius 0 = invisible; avoids re-creating the array each frame.
    new ScatterplotLayer({
      id: 'complaints',
      data: COMPLAINTS,            // static reference, never replaced
      getPosition: d => [d.lon, d.lat],
      getRadius: d => {
        const age = t_ms - d.created_ms;
        return (age >= 0 && age <= FADE_MS) ? 200 : 0;
      },
      getFillColor: d => {
        const age = t_ms - d.created_ms;
        if (age < 0 || age > FADE_MS) return [0, 0, 0, 0];
        return [231, 76, 60, Math.round(255 * (1 - age / FADE_MS))];
      },
      radiusUnits: 'meters',
      radiusMinPixels: 0,
      updateTriggers: { getRadius: frameId, getFillColor: frameId },
      pickable: true,
    }),
  ];
}

// ── Animation state ────────────────────────────────────────────────
let currentT  = STORM_START_MS;
let isPlaying = false;
let prevRaf   = null;

function getSpeedMultiplier() {
  return parseFloat(document.getElementById('speed-select').value);
}

function formatET(t_ms) {
  return new Date(t_ms).toLocaleString('en-US', {
    timeZone:  'America/New_York',
    month:     'short',
    day:       'numeric',
    hour:      '2-digit',
    minute:    '2-digit',
    hour12:    false,
  }) + ' ET';
}

function render(t_ms) {
  updateDepthCache(t_ms);
  deckgl.setProps({ layers: buildLayers(t_ms) });
  document.getElementById('current-time').textContent = formatET(t_ms);
  document.getElementById('scrubber').value =
    Math.round(((t_ms - STORM_START_MS) / STORM_MS) * 10000);
}

function tick(realTime) {
  if (!isPlaying) return;
  if (prevRaf !== null) {
    const delta   = Math.min(realTime - prevRaf, 100); // cap at 100ms to avoid jump on tab refocus
    const stormDt = delta * BASE_SPEED * getSpeedMultiplier() / 1000;
    currentT = Math.min(currentT + stormDt, STORM_END_MS);
    render(currentT);
    if (currentT >= STORM_END_MS) {
      isPlaying = false;
      document.getElementById('play-btn').innerHTML = '&#9654;';
      prevRaf = null;
      return;
    }
  }
  prevRaf = realTime;
  requestAnimationFrame(tick);
}

// ── Controls ───────────────────────────────────────────────────────
document.getElementById('play-btn').addEventListener('click', () => {
  isPlaying = !isPlaying;
  document.getElementById('play-btn').innerHTML = isPlaying ? '&#9646;&#9646;' : '&#9654;';
  if (isPlaying) {
    if (currentT >= STORM_END_MS) currentT = STORM_START_MS;
    prevRaf = null;
    requestAnimationFrame(tick);
  }
});

document.getElementById('scrubber').addEventListener('input', e => {
  currentT = STORM_START_MS + (e.target.value / 10000) * STORM_MS;
  render(currentT);
});

// Handle window resize
window.addEventListener('resize', () => {
  deckgl.setProps({ width: window.innerWidth, height: window.innerHeight });
});

// Show MRMS legend row only when data is present
if (MRMS_FRAMES.length > 0) {
  document.getElementById('mrms-legend-row').style.display = '';
}

// Initial render
render(currentT);
</script>
</body>
</html>
